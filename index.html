<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施昱廷 職能治療師｜衛教手冊</title>
<meta name="description" content="施昱廷職能治療師的實證衛教手冊系列——如廁訓練、睡眠照顧，白話好懂、免費閱讀。">
<style>
  :root{
    --jet:#13262F;
    --olive:#73683B;
    --walnut:#583E23;
    --khaki:#B0A084;
    --cream:#F4EFE3;
    --card:#FAF6EE;
    --lavender:#E9E6FF;
    --gold:#E8C766;
    --line:#E3DCC9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--cream);
    color:var(--jet);
    line-height:1.8;
  }
  header{
    background:linear-gradient(150deg,#0F1E26 0%,#13262F 48%,#1B3446 100%);
    color:var(--lavender);
    text-align:center;
    padding:48px 20px 40px;
  }
  header h1{font-size:26px;letter-spacing:2px;}
  header p{margin-top:8px;font-size:15px;color:var(--khaki);}
  main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
  .book{
    display:block;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px 26px;
    margin-bottom:20px;
    text-decoration:none;
    color:var(--jet);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .book:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(19,38,47,.10);}
  .book h2{font-size:20px;margin-bottom:6px;}
  .book h2 span{color:var(--olive);}
  .book p{font-size:15px;color:#4a5a63;}
  .tag{
    display:inline-block;
    margin-top:10px;
    font-size:13px;
    background:var(--lavender);
    color:var(--jet);
    border-radius:999px;
    padding:2px 12px;
  }
  footer{text-align:center;font-size:13px;color:var(--khaki);padding:0 20px 40px;}
</style>
</head>
<body>
<header>
  <h1>衛教手冊系列</h1>
  <p>施昱廷 職能治療師｜白話實證，免費閱讀</p>
</header>
<main>
  <a class="book" href="./toilet-guide/">
    <h2>🚽 <span>如廁訓練大寶典</span></h2>
    <p>失能長輩的如廁照顧 QA——從輔具、動作拆解到照顧技巧，一次講清楚。</p>
    <span class="tag">附 PDF 下載</span>
  </a>
  <a class="book" href="./sleep-guide/">
    <h2>🌙 <span>睡眠寶典</span></h2>
    <p>長輩為什麼睡不好？講清楚體溫、光照、泡腳和 9 種幫助睡覺的方法。</p>
    <span class="tag">近十年研究背書</span>
  </a>
</main>
<footer>© 施昱廷 職能治療師｜歡迎分享原始連結，請勿改作</footer>
</body>
</html>
